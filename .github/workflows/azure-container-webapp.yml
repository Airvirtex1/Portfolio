name: Build and Deploy to Azure App Service

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: portfolio-mateo

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push container image
        run: |
          # On précise le dossier 'react-portfolio' pour le build
          docker build ./react-portfolio -t ${{ secrets.ACR_LOGIN_SERVER }}/portfolio:${{ github.sha }} -t ${{ secrets.ACR_LOGIN_SERVER }}/portfolio:latest
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/portfolio:${{ github.sha }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/portfolio:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: '${{ secrets.ACR_LOGIN_SERVER }}/portfolio:${{ github.sha }}'
