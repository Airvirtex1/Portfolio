# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - portfolio-mateo

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to container registry
        uses: docker/login-action@v2
        with:
          registry: acrportfoliomateo2026.azurecr.io/
          username: ${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_2CCB116F2AD14594BEB29823E8181FE1 }}
          password: ${{ secrets.AZUREAPPSERVICE_CONTAINERPASSWORD_DC7871E100C34CAEAAC7F14A7691E15D }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: acrportfoliomateo2026.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_2CCB116F2AD14594BEB29823E8181FE1 }}/portfolio:${{ github.sha }}
          file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    needs: build
    
    steps:
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_B78518BDAE8D483F8B6ECC8BBE0B5132 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_A1C06B5C3A6143C094E397B30E5EE150 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_117F2C0AD4A34CB896C36E6D7D9E23ED }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'portfolio-mateo'
          slot-name: 'Production'
          images: 'acrportfoliomateo2026.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_2CCB116F2AD14594BEB29823E8181FE1 }}/portfolio:${{ github.sha }}'
          