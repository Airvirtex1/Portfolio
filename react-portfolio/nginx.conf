server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── SPA fallback ─────────────────────────────────────────────
    # All routes that don't match a physical file are served index.html,
    # letting React Router handle client-side navigation.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Static asset caching ─────────────────────────────────────
    # Vite outputs hashed filenames (main-Cx3kP9aZ.js) so assets can be
    # cached indefinitely — the hash changes on every rebuild.
    location ~* \.(js|css|woff2?|ttf|otf|eot|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~* \.(png|jpe?g|gif|svg|webp)$ {
        expires 6M;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── Compression ───────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # ── Security headers ──────────────────────────────────────────
    # These complement the meta-tag CSP already set in index.html.
    # HTTP headers are stronger — they cannot be stripped by a rogue script.
    add_header X-Frame-Options          "DENY"                            always;
    add_header X-Content-Type-Options   "nosniff"                         always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;
}
